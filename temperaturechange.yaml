blueprint:
  name: Climate Alert
  description: Notification
  domain: automation
  input:
    climate:
      name: Climate Entity
      selector:
        entity:
          filter:
            domain: climate

    temp:
      name: Trigger Temp
      description: Temp value to trigger the automation.
      default: 70
      selector:
        number:
          min: 32
          max: 100
          unit_of_measurement: "°"
          mode: box
    mode:
      name: Alert Condition
      description: "Select whether to trigger when the target temperature goes above or below your trigger temp."
      selector:
        select:
          options:
            - "above temperature"
            - "below temperature"

    notify_device:
      name: Device to notify
      description: Device needs to run the official Home Assistant app to receive notifications
      selector:
        device:
          filter:
            integration: mobile_app

variables:
  mode: !input mode
  temp: !input temp
  climate: !input climate

trigger:
  - trigger: state
    entity_id: !input climate
    attribute: temperature

action:
  - alias: "choose alias (name)"
    choose:
      - conditions:
          - condition: or
            conditions:
              - alias: "Too Hot (Above Temp)"
                condition: template
                value_template: "{{ mode == 'above temperature' and (state_attr(climate, 'temperature') > temp) }}"
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: >-
              {% set user_id = trigger.to_state.context.user_id %}
              {% set person = states.person | selectattr('attributes.user_id', '==', user_id) | first | default(none) %}
              {% set name = person.attributes.friendly_name if person else 'system' %}
              {% set hvac_state = states(climate) %}
              {% set emoji = '☀️' if hvac_state == 'cool' else '🔥' %}
              {{ emoji }} Climate set high to {{ int(state_attr(climate, 'temperature')) }}° ({{ hvac_state }} mode) by {{ name }}
            data:
              actions:
                - action: DO_NOTHING
                  title: Leave it as-is!
                  icon: sfsymbols:checkmark.circle
                  destructive: false
                - action: SET_TO_TEMP
                  title: Set it to {{ temp }}
                  destructive: false
                  icon: sfsymbols::arrow.down.circle
      - conditions:
          - condition: or
            conditions:
              - alias: "Too Cold (Below Temp)"
                condition: template
                value_template: "{{ mode == 'below temperature' and (state_attr(climate, 'temperature') < temp) }}"
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: >-
              {% set user_id = trigger.to_state.context.user_id %}
              {% set person = states.person | selectattr('attributes.user_id', '==', user_id) | first | default(none) %}
              {% set name = person.attributes.friendly_name if person else 'system' %}
              {% set hvac_state = states(climate) %}
              {% set emoji = '❄️' if hvac_state == 'cool' else '🥶' %}
              {{ emoji }} Climate set low to {{ int(state_attr(climate, 'temperature')) }}° ({{ hvac_state }} mode) by {{ name }}
            data:
              actions:
                - action: DO_NOTHING
                  title: Leave it as-is!
                  icon: sfsymbols:checkmark.circle
                  destructive: false
                - action: SET_TO_TEMP
                  title: Set it to {{ temp }}
                  destructive: false
                  icon: sfsymbols::arrow.up.circle
  - alias: Wait for Input
    wait_for_trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: LEAVE_AS_IS
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: SET_TO_TEMP
  - alias: "Change Climate"
    choose:
      - alias: "Set to target temp"
        conditions: "{{ wait.trigger.event.data.action == 'SET_TO_TEMP' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: !input climate
            data:
              temperature: !input temp
      - alias: "Target minus 1"
        conditions: "{{ wait.trigger.event.data.action == 'SET_TO_TEMP_MINUS_ONE' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: !input climate
            data:
              temperature: "{{ int(temp) - 1 }}"
      - alias: "Target plus 1"
        conditions: "{{ wait.trigger.event.data.action == 'SET_TO_TEMP_PLUS_ONE' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: !input climate
            data:
              temperature: "{{ int(temp) + 1 }}"

mode: restart
